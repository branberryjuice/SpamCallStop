<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customers &middot; SpamCallStop Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  body{background:var(--surface)}
  .adwrap{max-width:1120px;margin:0 auto;padding:1.4rem var(--pad) 4rem}
  .adtop{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1.1rem}
  .adtitle{font-weight:800;font-size:1.4rem;color:var(--ink);letter-spacing:-.01em}
  .adtitle .tag{font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);background:var(--accent-tint);padding:.25rem .5rem;border-radius:var(--r-sm);vertical-align:2px;margin-left:.4rem}
  .keybar{display:flex;gap:.5rem;align-items:center}
  .keybar input{font-family:var(--font);font-size:.95rem;padding:.55rem .8rem;min-height:42px;border:1.5px solid var(--border-strong);border-radius:var(--r);background:#fff;width:220px}
  .keybar input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-tint)}
  .keybar button{font-family:var(--font);font-weight:700;font-size:.95rem;padding:.55rem 1rem;min-height:42px;border:none;border-radius:var(--r);background:var(--ink);color:#fff;cursor:pointer}
  .banner{font-size:.86rem;font-weight:600;border-radius:var(--r);padding:.6rem .9rem;margin-bottom:1rem}
  .banner.sample{background:#FFF7E6;border:1px solid #F0D27A;color:#7A5B00}
  .banner.err{background:var(--accent-tint);border:1px solid #E7BCBC;color:var(--accent-strong)}
  .banner.live{background:var(--green-tint);border:1px solid #BBE3CC;color:var(--green-strong)}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem;margin-bottom:1.4rem}
  .scard{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);padding:1rem 1.1rem}
  .scard .n{font-size:1.9rem;font-weight:800;color:var(--ink);line-height:1;letter-spacing:-.02em}
  .scard .l{color:var(--muted);font-weight:700;font-size:.82rem;text-transform:uppercase;letter-spacing:.04em;margin-top:.3rem}
  .tablewrap{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:.95rem}
  thead th{text-align:left;background:var(--surface-2);color:var(--muted);font-weight:800;font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;padding:.7rem 1rem;border-bottom:1px solid var(--border)}
  tbody td{padding:.85rem 1rem;border-bottom:1px solid var(--border);vertical-align:top}
  tbody tr:last-child td{border-bottom:none}
  .cust b{color:var(--ink);font-weight:700;display:block}
  .cust small{color:var(--muted)}
  .planbadge{display:inline-block;font-weight:800;font-size:.74rem;letter-spacing:.03em;text-transform:uppercase;padding:.28rem .6rem;border-radius:999px;white-space:nowrap}
  .planbadge.ind{background:var(--surface-2);color:var(--ink)}
  .planbadge.cpl{background:var(--accent-tint);color:var(--accent-strong)}
  .num{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem;flex-wrap:wrap}
  .num:last-child{margin-bottom:0}
  .num .ph{font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
  .pill{font-size:.7rem;font-weight:800;letter-spacing:.03em;text-transform:uppercase;padding:.22rem .5rem;border-radius:999px}
  .pill.pending{background:var(--surface-2);color:var(--muted)}
  .pill.queued{background:#E7EEF8;color:#2B5C9B}
  .pill.in_progress{background:#FBEFD6;color:#8A5A00}
  .pill.removed{background:var(--green-tint);color:var(--green-strong)}
  .pill.failed{background:var(--accent-tint);color:var(--accent-strong)}
  .muted2{color:var(--muted)}
  @media (max-width:820px){ .cards{grid-template-columns:repeat(2,1fr)} .hidesm{display:none} }
</style>
</head>
<body>
<div class="adwrap">
  <div class="adtop">
    <div class="adtitle">Spam<span style="color:var(--accent)">Call</span>Stop <span class="tag">Admin</span></div>
    <div class="keybar">
      <input id="key" type="password" placeholder="Admin key" autocomplete="off">
      <button onclick="load()">Load live</button>
    </div>
  </div>

  <div class="banner sample" id="banner">Showing sample data so you can see the layout. Enter your admin key and press Load live to pull real customers.</div>

  <div class="cards">
    <div class="scard"><div class="n" id="cTotal">0</div><div class="l">Customers</div></div>
    <div class="scard"><div class="n" id="cInd">0</div><div class="l">Individual</div></div>
    <div class="scard"><div class="n" id="cCpl">0</div><div class="l">Couple</div></div>
    <div class="scard"><div class="n" id="cNum">0</div><div class="l">Numbers protected</div></div>
  </div>

  <div class="tablewrap">
    <table>
      <thead>
        <tr>
          <th>Customer</th><th>Plan</th><th>Numbers &amp; removal status</th>
          <th class="hidesm">Billing</th><th class="hidesm">Subscription</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>
  // Sample rows — purely to show the layout. Replaced by live data on Load.
  var SAMPLE = [
    { name:'Margaret Ellis', email:'margaret.e@email.com', plan:'Solo', planLabel:'Individual', billing:'yearly', status:'active', subscription:'sub_demo1',
      numbers:[{phone:'(217) 555-0142', label:'Number 1', status:'in_progress'}] },
    { name:'Tom and Linda Park', email:'tpark@email.com', plan:'Dual', planLabel:'Couple', billing:'yearly', status:'active', subscription:'sub_demo2',
      numbers:[{phone:'(312) 555-0188', label:'Number 1', status:'removed'},{phone:'(312) 555-0177', label:'Number 2', status:'in_progress'}] },
    { name:'Robert Chen', email:'rchen@email.com', plan:'Dual', planLabel:'Couple', billing:'monthly', status:'active', subscription:'sub_demo3',
      numbers:[{phone:'(415) 555-0123', label:'Number 1', status:'pending'},{phone:'(415) 555-0199', label:'Number 2', status:'pending'}] }
  ];

  var KNOWN = { pending:1, queued:1, in_progress:1, removed:1, failed:1 };
  function esc(s){ var d=document.createElement('div'); d.textContent = (s==null?'':String(s)); return d.innerHTML; }
  function pill(s){ var k = KNOWN[s] ? s : 'pending'; return '<span class="pill '+k+'">'+esc((s||'pending').replace(/_/g,' '))+'</span>'; }

  function summarize(list){
    document.getElementById('cTotal').textContent = list.length;
    document.getElementById('cInd').textContent = list.filter(function(c){return c.plan==='Solo';}).length;
    document.getElementById('cCpl').textContent = list.filter(function(c){return c.plan==='Dual';}).length;
    document.getElementById('cNum').textContent = list.reduce(function(n,c){return n + (c.numbers?c.numbers.length:0);},0);
  }
  function render(list){
    summarize(list);
    document.getElementById('rows').innerHTML = list.map(function(c){
      var badge = c.plan==='Dual' ? '<span class="planbadge cpl">Couple</span>' : '<span class="planbadge ind">Individual</span>';
      var nums = (c.numbers||[]).map(function(n){
        return '<div class="num"><span class="ph">'+esc(n.phone)+'</span>'+pill(n.status)+
               '<span class="muted2" style="font-size:.78rem">'+esc(n.label||'')+'</span></div>';
      }).join('') || '<span class="muted2">&mdash;</span>';
      return '<tr>'+
        '<td class="cust"><b>'+esc(c.name||'(no name)')+'</b><small>'+esc(c.email||'')+'</small></td>'+
        '<td>'+badge+'</td>'+
        '<td>'+nums+'</td>'+
        '<td class="hidesm muted2">'+esc(c.billing||'')+'</td>'+
        '<td class="hidesm muted2" style="font-size:.82rem">'+esc(c.subscription||c.status||'')+'</td>'+
      '</tr>';
    }).join('');
  }
  function setBanner(kind, msg){ var b=document.getElementById('banner'); b.className='banner '+kind; b.textContent=msg; }

  function load(){
    var key = (document.getElementById('key').value||'').trim();
    if(!key){ setBanner('err','Enter your admin key first.'); return; }
    try{ localStorage.setItem('scstop_admin_key', key); }catch(e){}
    setBanner('sample','Loading...');
    fetch('/api/admin/customers?key='+encodeURIComponent(key))
      .then(function(r){ return r.json().catch(function(){return null;}); })
      .then(function(d){
        if(d && d.ok){
          render(d.customers||[]);
          setBanner('live','Live data — '+((d.summary&&d.summary.total)||0)+' customer(s).');
        } else {
          render(SAMPLE);
          setBanner('err', (d && d.error==='unauthorized') ? 'That key was rejected. Showing sample data.' : 'Could not load live data. Showing sample.');
        }
      })
      .catch(function(){ render(SAMPLE); setBanner('err','Could not reach the server. Showing sample data.'); });
  }

  // First paint: sample so the layout shows immediately; auto-load if a key is saved.
  render(SAMPLE);
  try{ var k = localStorage.getItem('scstop_admin_key'); if(k){ document.getElementById('key').value = k; load(); } }catch(e){}
</script>
</body>
</html>
